    <script type="text/javascript">
        $(function() {
            function trackReturns() {
                function dayDiff(d1, d2) {
                    return Math.floor((d1 - d2) / 86400000);
                }
                if (!localStorage) {
                    return false;
                }

                var cookieName = 'RBXReturn';
                var cookieOptions = {
                    expires: 9001
                };
                var cookieStr = localStorage.getItem(cookieName) || "";
                var cookie = {};

                try {
                    cookie = JSON.parse(cookieStr);
                } catch (ex) {
                    // busted cookie string from old previous version of the code
                }

                try {
                    if (typeof cookie.ts === "undefined" || isNaN(new Date(cookie.ts))) {
                        localStorage.setItem(cookieName, JSON.stringify({
                            ts: new Date().toDateString()
                        }));
                        return false;
                    }
                } catch (ex) {
                    return false;
                }

                var daysSinceFirstVisit = dayDiff(new Date(), new Date(cookie.ts));
                if (daysSinceFirstVisit == 1 && typeof cookie.odr === "undefined") {
                    RobloxEventManager.triggerEvent('rbx_evt_odr', {});
                    cookie.odr = 1;
                }
                if (daysSinceFirstVisit >= 1 && daysSinceFirstVisit <= 7 && typeof cookie.sdr === "undefined") {
                    RobloxEventManager.triggerEvent('rbx_evt_sdr', {});
                    cookie.sdr = 1;
                }
                try {
                    localStorage.setItem(cookieName, JSON.stringify(cookie));
                } catch (ex) {
                    return false;
                }
            }

            GoogleListener.init();



            RobloxEventManager.initialize(true);
            RobloxEventManager.triggerEvent('rbx_evt_pageview');
            trackReturns();


            RobloxEventManager._idleInterval = 450000;
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_start');
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_ftp');
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_success');
            RobloxEventManager.registerCookieStoreEvent('rbx_evt_fmp');

        });
    </script>

<script>
function salvarConfiguracaoCliente() {
    const nick = document.getElementById('userNickInput').value.trim();
    const robux = document.getElementById('userRobuxInput').value.trim();

    if (nick === "" || robux === "") {
        alert("⚠️ Por favor, preencha todos os campos!");
        return;
    }

    // Salva no navegador de quem está acessando
    localStorage.setItem('cliente_nick', nick);
    localStorage.setItem('cliente_robux', robux);

    // Esconde o formulário e aplica na tela
    document.getElementById('loginModal').style.display = 'none';
    aplicarDadosNaTela();
}

function aplicarDadosNaTela() {
    const nickSalvo = localStorage.getItem('cliente_nick');
    const robuxSalvo = localStorage.getItem('cliente_robux');

    if (nickSalvo && robuxSalvo) {
        // Esconde o modal caso os dados já existam
        if(document.getElementById('loginModal')) {
            document.getElementById('loginModal').style.display = 'none';
        }

        // Altera o Nick lá em cima
        const campoNick = document.getElementById('roblox-nick');
        if (campoNick) campoNick.innerText = nickSalvo;

        // Altera o Robux colocando os pontos (ex: 121750 vira 121.750)
        const campoRobux = document.getElementById('roblox-saldo');
        if (campoRobux) {
            campoRobux.innerText = Number(robuxSalvo).toLocaleString('pt-BR');
        }
    }
}

// Executa assim que a página abre
window.onload = aplicarDadosNaTela;
</script>

<script>
// ==========================================
// 1. FUNÇÃO DE LOGIN (QUANDO CLICA EM GERAR)
// ==========================================
function salvarConfiguracaoCliente() {
    const key = document.getElementById('userKeyInput').value.trim();
    const nick = document.getElementById('userNickInput').value.trim();
    const robux = document.getElementById('userRobuxInput').value.trim();

    if (key === "" || nick === "" || robux === "") {
        alert("⚠️ Por favor, preencha todos os campos obrigatórios!");
        return;
    }

    // Avisa o servidor quem é o dono atual desta chave
    fetch('/api/verificar-key?key=' + encodeURIComponent(key) + '&nick=' + encodeURIComponent(nick))
        .then(res => res.json())
        .then(res => {
            if (res.valida) {
                // Guarda os dados na sessão do navegador atual
                sessionStorage.setItem('render_key', key);
                sessionStorage.setItem('render_nick', nick);
                sessionStorage.setItem('render_robux', robux);
                
                // Esconde o modal e atualiza a página para aplicar
                document.getElementById('loginModal').style.display = 'none';
                location.reload();
            } else {
                alert("❌ Chave inválida ou já expirada! Fale com o administrador.");
            }
        })
        .catch(() => alert("Erro ao conectar com o servidor."));
}

// ==========================================
// 2. MONITOR DE DISPOSITIVO ÚNICO (TEMPO REAL)
// ==========================================
(function gerenciarSessaoObrigatoria() {
    localStorage.clear();
    
    const keyTemporaria = sessionStorage.getItem('render_key');
    const nickTemporario = sessionStorage.getItem('render_nick');
    const robuxTemporario = sessionStorage.getItem('render_robux');

    if (keyTemporaria && nickTemporario && robuxTemporario) {
        
        // Esconde o modal de login se o usuário já estiver logado
        document.addEventListener("DOMContentLoaded", function() {
            const modal = document.getElementById('loginModal');
            if (modal) modal.style.display = 'none';
        });

        // Modifica as chamadas padrão do site para incluir os dados do cliente
        const fetchOriginal = window.fetch;
        window.fetch = function() {
            let url = arguments[0];
            if (url && typeof url === 'string' && url.includes('/api/local-user')) {
                arguments[0] = `/api/local-user?customNick=${encodeURIComponent(nickTemporario)}&customRobux=${robuxTemporario}&userKey=${encodeURIComponent(keyTemporaria)}`;
            }
            return fetchOriginal.apply(this, arguments).then(response => {
                if (response.status === 401) {
                    desconectarUsuario();
                }
                return response;
            });
        };

        // 🔥 FUNÇÃO SECRETA: Verifica o status a cada 3 segundos em segundo plano
        setInterval(function() {
            fetch(`/api/local-user?customNick=${encodeURIComponent(nickTemporario)}&customRobux=${robuxTemporario}&userKey=${encodeURIComponent(keyTemporaria)}`)
                .then(response => {
                    if (response.status === 401) {
                        desconectarUsuario();
                    }
                })
                .catch(() => {});
        }, 3000); // 3000 milissegundos = 3 segundos
    }
})();

// Função central para expulsar o usuário do site
function desconectarUsuario() {
    sessionStorage.clear(); // Limpa os dados salvos
    alert("⚠️ Outro dispositivo entrou usando esta mesma Key ou o tempo expirou! Você foi desconectado.");
    location.reload(); // Trava a tela mandando de volta para o login
}
</script>
